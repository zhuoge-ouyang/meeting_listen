name: recordwise
description: RecordWise - Smart Voice Recording & AI Transcription App

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # Core dependencies
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.1
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # File Operations
  path_provider: ^2.1.1
  
  # HTTP
  dio: ^5.3.2
  http_parser: ^4.0.0
  path: ^1.8.0
  
  # Audio Recording
  record: ^6.2.0
  audioplayers: ^6.1.0

  # Utils
  intl: ^0.20.2
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/textures/
    - assets/avatars/
    - assets/home/home_hero.jpg
    - assets/home/launch_planet.jpg
